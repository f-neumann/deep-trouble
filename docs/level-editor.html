<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deep Trouble — Level Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #080808;
  --bg2:    #101010;
  --bg3:    #181818;
  --red:    #cc1a1a;
  --gold:   #f0c040;
  --green:  #66cc44;
  --text:   #ddd;
  --dim:    #666;
  --border: #282828;
  --font:   'Menlo', 'Monaco', 'Courier New', monospace;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  height: 38px;
}
header h1 {
  color: var(--red);
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
#status-bar {
  color: var(--dim);
  font-size: 11px;
  margin-left: auto;
}

/* ── Main layout ── */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── Palette ── */
#palette {
  width: 148px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 8px 6px;
  gap: 3px;
}
.pal-heading {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  padding: 2px 2px 5px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}
.tile-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
  cursor: pointer;
  color: var(--text);
  font-family: var(--font);
  font-size: 11px;
  width: 100%;
  text-align: left;
  transition: border-color 0.1s;
}
.tile-btn:hover  { border-color: #444; }
.tile-btn.active { border-color: var(--red); color: var(--red); }
.tile-btn canvas { flex-shrink: 0; image-rendering: pixelated; }
.tile-key { margin-left: auto; color: var(--dim); font-size: 10px; }

/* ── Grid area ── */
#grid-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  background: var(--bg);
  padding: 12px;
}
#grid {
  cursor: crosshair;
  image-rendering: pixelated;
  display: block;
}

/* ── Right panel ── */
#right {
  width: 210px;
  flex-shrink: 0;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 10px 8px;
  gap: 10px;
}
.section { display: flex; flex-direction: column; gap: 5px; }
.section-heading {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
label { color: var(--dim); font-size: 10px; }
input[type="text"], input[type="number"], textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 6px;
  width: 100%;
  outline: none;
}
input[type="text"]:focus,
input[type="number"]:focus,
textarea:focus { border-color: #444; }

.btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 8px;
  cursor: pointer;
  width: 100%;
  transition: border-color 0.1s, color 0.1s, background 0.1s;
  text-align: center;
}
.btn:hover           { border-color: #555; }
.btn.primary         { border-color: var(--red); color: var(--red); }
.btn.primary:hover   { background: var(--red); color: #fff; }

.help-text {
  color: var(--dim);
  font-size: 10px;
  line-height: 1.9;
}

/* ── Output ── */
#output-area {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  height: 130px;
}
.output-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.output-row span { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
.copy-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  cursor: pointer;
}
.copy-btn:hover { border-color: #555; color: var(--text); }
#swift-output {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: #88cc88;
  font-family: var(--font);
  font-size: 11px;
  padding: 5px 7px;
  resize: none;
  outline: none;
  white-space: pre;
  overflow: auto;
  tab-size: 4;
}
</style>
</head>
<body>

<header>
  <h1>Deep Trouble — Level Editor</h1>
  <span id="status-bar">Ready</span>
</header>

<div class="main">

  <!-- Palette -->
  <div id="palette">
    <div class="pal-heading">Tiles</div>
    <!-- filled by JS -->
  </div>

  <!-- Canvas grid -->
  <div id="grid-area">
    <canvas id="grid"></canvas>
  </div>

  <!-- Right panel -->
  <div id="right">

    <div class="section">
      <div class="section-heading">Level Info</div>
      <label>Comment</label>
      <input type="text" id="inp-comment" placeholder='e.g. "The force awakens"'>
      <label>Diamonds Required</label>
      <input type="number" id="inp-diamonds" value="0" min="0" max="999">
      <label>Time Limit</label>
      <input type="number" id="inp-time" value="99" min="1" max="999">
    </div>

    <div class="section">
      <div class="section-heading">Actions</div>
      <button class="btn primary" id="btn-gen">Share Level</button>
      <button class="btn" id="btn-border">Fill Border (#)</button>
      <button class="btn" id="btn-new">New Level</button>
      <button class="btn" id="btn-clear">Clear All</button>
    </div>

    <div class="section">
      <div class="section-heading">Load Layout</div>
      <label>Paste a layout string:</label>
      <textarea id="inp-load" rows="6" placeholder="Paste layout rows here, then click Load"></textarea>
      <button class="btn" id="btn-load">Load</button>
    </div>

    <div class="section">
      <div class="section-heading">Shortcuts</div>
      <div class="help-text">
        1–0 &nbsp;Select tile<br>
        E &nbsp;&nbsp;&nbsp;Erase mode<br>
        Ctrl+Z &nbsp;Undo<br>
        Ctrl+Y &nbsp;Redo<br>
        Right-click &nbsp;Erase<br>
        Drag &nbsp;&nbsp;Paint
      </div>
    </div>

  </div>
</div>

<!-- Output strip -->
<div id="output-area">
  <div class="output-row">
    <span>Level Layout</span>
    <button class="copy-btn" id="btn-copy">Copy</button>
  </div>
  <textarea id="swift-output" readonly spellcheck="false" wrap="off">(click "Share Level" to generate the layout)</textarea>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────────────────────
const COLS = 20, ROWS = 12, TS = 32;   // tile size 32px → 640×384 canvas

const TILE_DEFS = [
  { ch: '#', label: 'Steel Wall', key: '1', imgKey: '#' },
  { ch: 'W', label: 'Brick Wall', key: '2', imgKey: null },
  { ch: '.', label: 'Dirt',       key: '3', imgKey: '.' },
  { ch: ' ', label: 'Empty',      key: '4', imgKey: null },
  { ch: 'O', label: 'Boulder',    key: '5', imgKey: 'O' },
  { ch: 'D', label: 'Diamond',    key: '6', imgKey: null },
  { ch: 'X', label: 'Exit',       key: '7', imgKey: 'X' },
  { ch: 'P', label: 'Player',     key: '8', imgKey: 'P' },
  { ch: 'F', label: 'Bat',        key: '9', imgKey: 'F' },
  { ch: 'B', label: 'Butterfly',  key: '0', imgKey: null },
];

const IMG_SRCS = {
  '#': 'BD/Assets.xcassets/wall_64x64.imageset/wall_64x64.png',
  '.': 'BD/Assets.xcassets/dirt_64x64.imageset/dirt_64x64.png',
  'O': 'BD/Assets.xcassets/boulder_64x64.imageset/boulder_64x64.png',
  'X': 'BD/Assets.xcassets/door_64x64.imageset/door_64x64.png',
  'P': 'BD/Assets.xcassets/hero_Idle64x64.imageset/hero_Idle64x64.png',
  'F': 'BD/Assets.xcassets/bat_idle_64x64.imageset/bat_idle_64x64.png',
};

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let grid          = emptyGrid();
let selCh         = '#';
let erasing       = false;
let painting      = false;
let paintRight    = false;
let hovered       = null;          // { col, row }
let generatedSwift = '';           // last generated output; used by Copy to avoid textarea mangling
const undoStack = [], redoStack = [];
const imgs = {};               // loaded images by char key

// ─────────────────────────────────────────────────────────────────────────────
// Image loading
// ─────────────────────────────────────────────────────────────────────────────
Object.entries(IMG_SRCS).forEach(([key, src]) => {
  const img = new Image();
  img.onload  = () => { imgs[key] = img; renderAll(); };
  img.onerror = () => console.warn(`Image not found: ${src}`);
  img.src = src;
});

// ─────────────────────────────────────────────────────────────────────────────
// Canvas
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('grid');
const ctx    = canvas.getContext('2d');
canvas.width  = COLS * TS;
canvas.height = ROWS * TS;

// ─────────────────────────────────────────────────────────────────────────────
// Tile drawing
// ─────────────────────────────────────────────────────────────────────────────
function drawTile(c, ch, x, y, s) {
  const def = TILE_DEFS.find(d => d.ch === ch) || TILE_DEFS[3];
  if (def.imgKey && imgs[def.imgKey]) {
    c.drawImage(imgs[def.imgKey], x, y, s, s);
    return;
  }
  switch (ch) {
    case ' ': fillEmpty(c, x, y, s);     break;
    case 'W': fillBrick(c, x, y, s);     break;
    case 'D': fillDiamond(c, x, y, s);   break;
    case 'B': fillButterfly(c, x, y, s); break;
    // Fallbacks for when images haven't loaded yet
    case '#': c.fillStyle='#2A3540'; c.fillRect(x,y,s,s); break;
    case '.': c.fillStyle='#5C3318'; c.fillRect(x,y,s,s); break;
    case 'O': fillBoulderFB(c, x, y, s); break;
    case 'X': c.fillStyle='#8B6914'; c.fillRect(x,y,s,s); break;
    case 'P': c.fillStyle='#2244AA'; c.fillRect(x,y,s,s); break;
    case 'F': c.fillStyle='#441122'; c.fillRect(x,y,s,s); break;
    default:  fillEmpty(c, x, y, s);     break;
  }
}

function fillEmpty(c, x, y, s) {
  c.fillStyle = '#060606';
  c.fillRect(x, y, s, s);
}

function fillBrick(c, x, y, s) {
  c.fillStyle = '#3A2414';
  c.fillRect(x, y, s, s);
  const bh = Math.max(8, (s / 3) | 0);
  c.fillStyle = '#1A0E08';
  for (let r = 0; r < 3; r++) {
    c.fillRect(x, y + r * bh, s, 1);
    const off = (r % 2 === 0) ? 0 : (s / 2) | 0;
    c.fillRect(x + off, y + r * bh, 1, bh);
  }
  c.fillStyle = 'rgba(220,160,80,0.10)';
  for (let r = 0; r < 3; r++)
    c.fillRect(x + 1, y + r * bh + 1, s - 2, 2);
}

function fillDiamond(c, x, y, s) {
  c.fillStyle = '#000a14';
  c.fillRect(x, y, s, s);
  const cx = x + s/2, cy = y + s/2, hw = s * 0.38, hh = s * 0.31;
  c.beginPath();
  c.moveTo(cx,      cy - hh);
  c.lineTo(cx + hw, cy);
  c.lineTo(cx,      cy + hh);
  c.lineTo(cx - hw, cy);
  c.closePath();
  const g = c.createLinearGradient(cx, cy - hh, cx, cy + hh);
  g.addColorStop(0,    '#AAEEFF');
  g.addColorStop(0.35, '#44AACC');
  g.addColorStop(0.65, '#2266AA');
  g.addColorStop(1,    '#88DDFF');
  c.fillStyle = g; c.fill();
  c.strokeStyle = 'rgba(180,240,255,0.8)'; c.lineWidth = 0.8; c.stroke();
  c.strokeStyle = 'rgba(255,255,255,0.25)'; c.lineWidth = 0.5;
  c.beginPath();
  c.moveTo(cx, cy - hh); c.lineTo(cx - hw, cy);
  c.moveTo(cx, cy - hh); c.lineTo(cx + hw, cy);
  c.stroke();
}

function fillButterfly(c, x, y, s) {
  c.fillStyle = '#080010';
  c.fillRect(x, y, s, s);
  const cx = x + s/2, cy = y + s/2;
  c.fillStyle = 'rgba(180,50,210,0.85)';
  ellipse4(c, cx - s*.22, cy - s*.12, s*.19, s*.15, -0.5);
  ellipse4(c, cx + s*.22, cy - s*.12, s*.19, s*.15,  0.5);
  c.fillStyle = 'rgba(140,30,175,0.7)';
  ellipse4(c, cx - s*.17, cy + s*.12, s*.14, s*.10,  0.5);
  ellipse4(c, cx + s*.17, cy + s*.12, s*.14, s*.10, -0.5);
  c.fillStyle = '#CC88FF';
  c.fillRect(cx - 1.5, cy - s*.28, 3, s*.56);
}

function ellipse4(c, ex, ey, rx, ry, rot) {
  c.beginPath();
  c.ellipse(ex, ey, rx, ry, rot, 0, Math.PI * 2);
  c.fill();
}

function fillBoulderFB(c, x, y, s) {
  c.fillStyle = '#060606'; c.fillRect(x, y, s, s);
  const cx = x + s/2, cy = y + s/2, r = s/2 - 2;
  const g = c.createRadialGradient(cx - r*.25, cy - r*.25, r*.08, cx, cy, r);
  g.addColorStop(0, '#B0A070'); g.addColorStop(0.5, '#706050'); g.addColorStop(1, '#201808');
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI*2);
  c.fillStyle = g; c.fill();
}

// ─────────────────────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────────────────────
function renderGrid() {
  for (let r = 0; r < ROWS; r++)
    for (let c2 = 0; c2 < COLS; c2++)
      drawTile(ctx, grid[r][c2], c2 * TS, r * TS, TS);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let c2 = 0; c2 <= COLS; c2++) {
    ctx.beginPath(); ctx.moveTo(c2*TS, 0); ctx.lineTo(c2*TS, ROWS*TS); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*TS); ctx.lineTo(COLS*TS, r*TS); ctx.stroke();
  }

  // Hover highlight
  if (hovered) {
    const { col, row } = hovered;
    ctx.strokeStyle = (erasing || paintRight) ? 'rgba(220,80,40,0.9)' : 'rgba(255,255,255,0.65)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(col*TS + 1, row*TS + 1, TS - 2, TS - 2);
  }
}

function renderPalette() {
  const pal = document.getElementById('palette');
  pal.innerHTML = '<div class="pal-heading">Tiles</div>';

  TILE_DEFS.forEach(def => {
    const btn = document.createElement('button');
    btn.className = 'tile-btn' + (def.ch === selCh && !erasing ? ' active' : '');

    const pc = document.createElement('canvas');
    pc.width = pc.height = 22;
    pc.style.width = pc.style.height = '22px';
    const pctx = pc.getContext('2d');
    drawTile(pctx, def.ch, 0, 0, 22);

    const lbl = document.createElement('span');
    lbl.textContent = def.label;

    const key = document.createElement('span');
    key.className = 'tile-key';
    key.textContent = def.key;

    btn.append(pc, lbl, key);
    btn.onclick = () => { selCh = def.ch; erasing = false; renderAll(); status(`Selected: ${def.label}`); };
    pal.appendChild(btn);
  });

  // Erase button
  const eb = document.createElement('button');
  eb.className = 'tile-btn' + (erasing ? ' active' : '');
  eb.innerHTML = `<span style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid #333">✕</span><span>Erase</span><span class="tile-key">E</span>`;
  eb.onclick = () => { erasing = !erasing; renderAll(); };
  pal.appendChild(eb);
}

function renderAll() {
  renderGrid();
  renderPalette();
}

// ─────────────────────────────────────────────────────────────────────────────
// Mouse
// ─────────────────────────────────────────────────────────────────────────────
function cellAt(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width, sy = canvas.height / r.height;
  const col = Math.floor((e.clientX - r.left) * sx / TS);
  const row = Math.floor((e.clientY - r.top)  * sy / TS);
  return (col >= 0 && col < COLS && row >= 0 && row < ROWS) ? { col, row } : null;
}

function paint(cell) {
  const ch = (erasing || paintRight) ? ' ' : selCh;
  if (grid[cell.row][cell.col] !== ch) {
    grid[cell.row][cell.col] = ch;
    renderGrid();
  }
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const cell = cellAt(e);
  if (!cell) return;
  paintRight = e.button === 2;
  saveUndo();
  painting = true;
  paint(cell);
});

canvas.addEventListener('mousemove', e => {
  const cell = cellAt(e);
  hovered = cell;
  if (painting && cell) paint(cell);
  else renderGrid();
  if (cell) {
    const ch = grid[cell.row][cell.col];
    const def = TILE_DEFS.find(d => d.ch === ch);
    status(`col ${cell.col}, row ${cell.row} — ${def ? def.label : 'unknown'} (${ch === ' ' ? 'space' : ch})`);
  }
});

canvas.addEventListener('mouseup',    () => { painting = false; paintRight = false; });
canvas.addEventListener('mouseleave', () => { painting = false; paintRight = false; hovered = null; renderGrid(); });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ─────────────────────────────────────────────────────────────────────────────
// Keyboard
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;

  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }

  if (e.key === 'e' || e.key === 'E') { erasing = !erasing; renderAll(); return; }

  const def = TILE_DEFS.find(d => d.key === e.key);
  if (def) { selCh = def.ch; erasing = false; renderAll(); status(`Selected: ${def.label}`); }
});

// ─────────────────────────────────────────────────────────────────────────────
// Undo / Redo
// ─────────────────────────────────────────────────────────────────────────────
function saveUndo() {
  undoStack.push(grid.map(r => [...r]));
  if (undoStack.length > 60) undoStack.shift();
  redoStack.length = 0;
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(grid.map(r => [...r]));
  grid = undoStack.pop();
  renderGrid(); status('Undo');
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(grid.map(r => [...r]));
  grid = redoStack.pop();
  renderGrid(); status('Redo');
}

// ─────────────────────────────────────────────────────────────────────────────
// Buttons
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btn-border').onclick = () => {
  saveUndo();
  for (let c2 = 0; c2 < COLS; c2++) { grid[0][c2] = '#'; grid[ROWS-1][c2] = '#'; }
  for (let r  = 0; r  < ROWS; r++)  { grid[r][0]  = '#'; grid[r][COLS-1]  = '#'; }
  renderGrid(); status('Border filled with steel wall');
};

document.getElementById('btn-new').onclick = () => {
  saveUndo();
  grid = emptyGrid();
  for (let c2 = 0; c2 < COLS; c2++) { grid[0][c2] = '#'; grid[ROWS-1][c2] = '#'; }
  for (let r  = 0; r  < ROWS; r++)  { grid[r][0]  = '#'; grid[r][COLS-1]  = '#'; }
  renderGrid(); status('New level with border');
};

document.getElementById('btn-clear').onclick = () => {
  if (!confirm('Clear the entire grid to empty?')) return;
  saveUndo();
  grid = emptyGrid();
  renderGrid(); status('Grid cleared');
};

document.getElementById('btn-gen').onclick = generateSwift;

document.getElementById('btn-copy').onclick = () => {
  if (!generatedSwift) { status('Click Share Level first'); return; }
  navigator.clipboard.writeText(generatedSwift)
    .then(() => status('Copied to clipboard (spaces preserved)'))
    .catch(() => {
      // Fallback: select textarea and execCommand
      const ta = document.getElementById('swift-output');
      ta.select();
      document.execCommand('copy');
      status('Copied (fallback)');
    });
};

document.getElementById('btn-load').onclick = () => {
  const raw = document.getElementById('inp-load').value;
  if (!raw.trim()) return;
  loadLayout(raw);
};

// ─────────────────────────────────────────────────────────────────────────────
// Load
// ─────────────────────────────────────────────────────────────────────────────
function loadLayout(str) {
  // Strip the first/last newlines that come from Swift triple-quoted strings
  let lines = str.replace(/^\n/, '').replace(/\n$/, '').split('\n');
  if (lines.length > ROWS) lines = lines.slice(0, ROWS);
  while (lines.length < ROWS) lines.push('');
  saveUndo();
  grid = lines.map(line => {
    const chars = line.split('');
    while (chars.length < COLS) chars.push(' ');
    return chars.slice(0, COLS);
  });
  renderGrid();
  status(`Loaded ${ROWS}×${COLS} level`);
}

// ─────────────────────────────────────────────────────────────────────────────
// Swift generation
// ─────────────────────────────────────────────────────────────────────────────
function generateSwift() {
  // Each row padded to exactly COLS chars so trailing empty tiles are preserved
  const out = grid.map(row => {
    const s = row.join('');
    return s.length >= COLS ? s.slice(0, COLS) : s.padEnd(COLS, ' ');
  }).join('\n');

  generatedSwift = out;
  document.getElementById('swift-output').value = out;
  status('Layout ready — hit Copy and send it in!');
}

// ─────────────────────────────────────────────────────────────────────────────
// Utility
// ─────────────────────────────────────────────────────────────────────────────
function emptyGrid() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(' '));
}

function status(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
// Start with a bordered empty level
document.getElementById('btn-new').onclick(); // triggers saveUndo → pop it
undoStack.length = 0;

renderAll();
status('Select a tile and click/drag on the grid to paint');
</script>
</body>
</html>
